<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>連弾スイッチャー v1 — 疑似対談×自動カメラ検証</title>
<style>
  :root{
    --bg:#0c0f14; --panel:#151b24; --panel2:#1c2430;
    --line:#2a3442; --text:#dce4ee; --dim:#7d8a9c;
    --tally:#ff4136; --meterA:#ffd166; --meterB:#6ec6ff;
    --mono:"SF Mono","Menlo",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
    font-family:-apple-system,"Hiragino Sans",sans-serif;font-size:14px}
  #stage{position:absolute;inset:0}
  canvas{display:block}

  /* ── タリー（現在ショット表示）── */
  #tally{position:absolute;top:12px;left:12px;display:flex;align-items:center;gap:10px;
    background:rgba(12,15,20,.82);border:1px solid var(--line);border-radius:8px;
    padding:8px 14px;font-family:var(--mono);font-size:15px;letter-spacing:.06em;
    backdrop-filter:blur(6px)}
  #tallyDot{width:10px;height:10px;border-radius:50%;background:var(--tally);
    box-shadow:0 0 8px var(--tally);animation:blink 1.2s infinite}
  @keyframes blink{50%{opacity:.35}}
  #shotLog{position:absolute;top:56px;left:12px;font-family:var(--mono);font-size:11px;
    color:var(--dim);line-height:1.7;pointer-events:none}

  /* ── コントロールデッキ ── */
  #deck{position:absolute;left:0;right:0;bottom:0;background:var(--panel);
    border-top:1px solid var(--line);padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;gap:8px}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .lbl{color:var(--dim);font-size:11px;width:58px;flex-shrink:0}
  button{background:var(--panel2);color:var(--text);border:1px solid var(--line);
    border-radius:8px;padding:9px 13px;font-size:13px;font-family:inherit}
  button:active{background:#26303f}
  button.on{background:#31465f;border-color:#4a6b93}
  button.tallyOn{background:#5b1f1c;border-color:var(--tally)}
  input[type=file]{display:none}
  .fileBtn{max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* ── レベルメーター ── */
  .meterWrap{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px}
  .meter{width:90px;height:8px;background:#0a0d11;border:1px solid var(--line);
    border-radius:4px;overflow:hidden}
  .meter>i{display:block;height:100%;width:0%;transition:width .06s linear}
  #meterA i{background:var(--meterA)} #meterB i{background:var(--meterB)}

  /* ── スタートオーバーレイ ── */
  #overlay{position:absolute;inset:0;background:rgba(8,10,14,.92);z-index:20;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    text-align:center;padding:24px}
  #overlay h1{font-size:20px;font-weight:600;letter-spacing:.04em}
  #overlay p{color:var(--dim);line-height:1.8;max-width:420px}
  #startBtn{font-size:17px;padding:14px 42px;background:#31465f;border-color:#4a6b93}
</style>
</head>
<body>
<div id="stage"></div>

<div id="tally"><span id="tallyDot"></span><span id="tallyText">STANDBY</span></div>
<div id="shotLog"></div>

<div id="deck">
  <div class="row">
    <span class="lbl">モデル</span>
    <button class="fileBtn" onclick="pickA.click()">話者A：VRM…</button>
    <input type="file" id="pickA" accept=".vrm">
    <button class="fileBtn" onclick="pickB.click()">話者B：VRM…</button>
    <input type="file" id="pickB" accept=".vrm">
    <button onclick="flip('A')">A↺向き</button>
    <button onclick="flip('B')">B↺向き</button>
  </div>
  <div class="row">
    <span class="lbl">ポーズ</span>
    <button class="fileBtn" id="poseABtn" onclick="poseA.click()">A：決めポーズ…</button>
    <input type="file" id="poseA">
    <button class="fileBtn" id="poseBBtn" onclick="poseB.click()">B：決めポーズ…</button>
    <input type="file" id="poseB">
  </div>
  <div class="row">
    <span class="lbl">音声</span>
    <button class="fileBtn" onclick="audA.click()">A：音声…</button>
    <input type="file" id="audA" accept="audio/*">
    <button class="fileBtn" onclick="audB.click()">B：音声…</button>
    <input type="file" id="audB" accept="audio/*">
    <button id="pseudoBtn" class="on">疑似トーク</button>
    <button id="playBtn">▶ 再生</button>
  </div>
  <div class="row">
    <span class="lbl">カメラ</span>
    <button id="autoBtn" class="on">AUTO</button>
    <button data-shot="WIDE">引き</button>
    <button data-shot="TWO">2ショット</button>
    <button data-shot="CU_A">Aアップ</button>
    <button data-shot="CU_B">Bアップ</button>
    <span style="flex:1"></span>
    <span class="meterWrap">A<span class="meter" id="meterA"><i></i></span></span>
    <span class="meterWrap">B<span class="meter" id="meterB"><i></i></span></span>
  </div>
</div>

<div id="overlay">
  <h1>連弾スイッチャー v1</h1>
  <p>2体のアバターで疑似対談を再生し、音声レベルから<br>
     インタビュー番組式の自動カメラワークを検証するテストリグ。<br><br>
     VRM・音声ファイルがなくても、デモ人形＋疑似トークで<br>
     カメラロジックだけ先に確認できる。</p>
  <button id="startBtn">スタート</button>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
  "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.1/lib/three-vrm.module.min.js"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

/* ══════════ 基本セットアップ ══════════ */
const stage = document.getElementById('stage');
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x14181f);
scene.fog = new THREE.Fog(0x14181f, 6, 14);

const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 50);

function resize(){
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize); resize();

/* ── 照明（スタジオ三灯）── */
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const key = new THREE.DirectionalLight(0xfff2e0, 1.5);
key.position.set(1.5, 3, 2.5); scene.add(key);
const fill = new THREE.DirectionalLight(0xbcd4ff, 0.5);
fill.position.set(-2, 2, 1.5); scene.add(fill);
const back = new THREE.DirectionalLight(0x8899ff, 0.8);
back.position.set(0, 3, -3); scene.add(back);

/* ── 簡易セット（床・壁・ラグ）── */
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  new THREE.MeshStandardMaterial({ color:0x1b212b, roughness:0.9 }));
floor.rotation.x = -Math.PI/2; scene.add(floor);

const rug = new THREE.Mesh(
  new THREE.CircleGeometry(1.6, 48),
  new THREE.MeshStandardMaterial({ color:0x2b3648, roughness:1 }));
rug.rotation.x = -Math.PI/2; rug.position.y = 0.005; scene.add(rug);

const wall = new THREE.Mesh(
  new THREE.PlaneGeometry(14, 5),
  new THREE.MeshStandardMaterial({ color:0x232b38, roughness:1 }));
wall.position.set(0, 2.5, -2.5); scene.add(wall);

const panel = new THREE.Mesh(
  new THREE.PlaneGeometry(3.2, 1.8),
  new THREE.MeshStandardMaterial({ color:0x161c26, roughness:0.6 }));
panel.position.set(0, 1.9, -2.45); scene.add(panel);

/* ══════════ 話者（VRM or デモ人形）══════════ */
const SEAT = {
  A: { x:-0.7, ry: 0.42 },
  B: { x: 0.7, ry:-0.42 },
};

function makeMannequin(color){
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color, roughness:0.7 });
  const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.16, 0.62, 6, 12), mat);
  body.position.y = 0.85; g.add(body);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.14, 24, 18), mat);
  head.position.y = 1.44; g.add(head);
  const mouth = new THREE.Mesh(
    new THREE.SphereGeometry(0.03, 12, 8),
    new THREE.MeshStandardMaterial({ color:0x331111 }));
  mouth.position.set(0, 1.40, 0.13); g.add(mouth);
  return { group:g, head, mouth, body };
}

class Speaker {
  constructor(id, color){
    this.id = id;
    this.root = new THREE.Group();
    this.root.position.x = SEAT[id].x;
    this.root.rotation.y = SEAT[id].ry;
    scene.add(this.root);

    this.vrm = null;
    this.mann = makeMannequin(color);
    this.root.add(this.mann.group);

    this.level = 0;          // 平滑化した音量 0..1
    this.speaking = false;
    this.nod = 0; this.nodT = 0;   // 相槌
    this.phase = Math.random()*10;
  }
  headWorld(v){
    const src = this.vrm
      ? this.vrm.humanoid.getNormalizedBoneNode('head')
      : this.mann.head;
    return src.getWorldPosition(v);
  }
  async loadVRM(file){
    const url = URL.createObjectURL(file);
    const loader = new GLTFLoader();
    loader.register(p => new VRMLoaderPlugin(p));
    try{
      const gltf = await loader.loadAsync(url);
      const vrm = gltf.userData.vrm;
      VRMUtils.removeUnnecessaryVertices(gltf.scene);
      VRMUtils.rotateVRM0(vrm);
      if (this.vrm) this.root.remove(this.vrm.scene);
      this.root.remove(this.mann.group);
      this.vrm = vrm;
      this.root.add(vrm.scene);
      // 腕の初期姿勢はここでは決め打ちしない（モデルごとに軸の向きが違うため信頼できない）
      // → 決めポーズは「ポーズ読み込み」で外部ファイルから与える方式に統一
    }catch(e){
      alert('VRMの読み込みに失敗：' + e.message);
    }finally{ URL.revokeObjectURL(url); }
  }
  async loadPose(file){
    try{
      const text = await file.text();
      const data = JSON.parse(text);
      const bd = data.BoneDefinition || data.boneDefinition;
      if (!bd) throw new Error('BoneDefinitionが見つからない形式');
      const map = {};
      for (const key in bd){
        const q = bd[key];
        if (!q || typeof q.x !== 'number') continue;
        // PascalCase（Hips, LeftUpperArm…）→ VRM Humanoidボーン名（hips, leftUpperArm…）
        const boneName = key.charAt(0).toLowerCase() + key.slice(1);
        map[boneName] = new THREE.Quaternion(q.x, q.y, q.z, q.w);
      }
      if (Object.keys(map).length === 0) throw new Error('有効なボーンが0件');
      this.pose = map;
    }catch(e){
      alert('ポーズの読み込みに失敗：' + e.message);
    }
  }
  /* ポーズ済みの体に、呼吸・発話・相槌の微振動を「上乗せ」する。
     決めポーズ自体は壊さず、各ボーンの姿勢に小さな回転を掛け合わせるだけ。 */
  applyPosedMotion(m){
    const h = this.vrm.humanoid;
    const setBone = (name, ex, ey, ez) => {
      const base = this.pose[name];
      const node = h.getNormalizedBoneNode(name);
      if (!base || !node) return;
      if (ex || ey || ez){
        const wobble = new THREE.Quaternion().setFromEuler(new THREE.Euler(ex||0, ey||0, ez||0));
        node.quaternion.copy(base).multiply(wobble);
      } else {
        node.quaternion.copy(base);
      }
    };
    // 体幹：呼吸と揺れをしっかり乗せる
    setBone('hips',   0, m.sway*0.15, 0);
    setBone('spine',  m.breathe, m.sway*0.5, 0);
    setBone('chest',  m.breathe*0.6, 0, 0);
    setBone('upperChest', m.breathe*0.4, 0, 0);
    setBone('neck',   m.talkNod*0.4 + m.nodAmt*0.4, (m.yaw||0)*0.3, m.sway*0.2);
    setBone('head',   m.talkNod + m.nodAmt, (m.yaw||0)*0.55, m.sway*0.3);
    // 腕・脚：決めポーズをほぼ保持しつつ、ごく微量だけ生きた揺らぎを混ぜる（2%程度の発想）
    const micro = 0.012;
    ['leftShoulder','rightShoulder','leftUpperArm','rightUpperArm',
     'leftLowerArm','rightLowerArm','leftHand','rightHand',
     'leftUpperLeg','rightUpperLeg','leftLowerLeg','rightLowerLeg',
     'leftFoot','rightFoot','leftToes','rightToes'].forEach((name,i)=>{
      setBone(name, Math.sin(m.t*0.8 + this.phase + i)*micro, 0, 0);
    });
  }
  /* 相手の方向への首の向き（ヨー）を、自分のローカル座標系で計算。
     「抜け」の空間に視線が刺さって初めて構図が成立する（アイラインの原則）。 */
  gazeYaw(partner){
    if (!partner) return 0;
    const self = this.headWorld(new THREE.Vector3());
    const other = partner.headWorld(new THREE.Vector3());
    const dir = other.sub(self);
    const local = dir.applyQuaternion(this.root.quaternion.clone().invert());
    let yaw = Math.atan2(local.x, local.z); // 正面(+Z)基準の水平角
    return THREE.MathUtils.clamp(yaw, -0.65, 0.65);
  }
  update(dt, t, partner){
    const lv = this.level;
    // 口パク
    if (this.vrm?.expressionManager){
      const v = Math.min(1, lv * 3.2) * (0.75 + 0.25*Math.sin(t*22 + this.phase));
      try{ this.vrm.expressionManager.setValue('aa', Math.max(0, v)); }catch(e){}
    } else {
      const s = 1 + Math.min(1, lv*4) * (1.6 + Math.sin(t*24)*0.8);
      this.mann.mouth.scale.set(s, s, s);
    }
    // 相槌タイマー（聞き手のとき時々うなずく）
    if (!this.speaking){
      this.nodT -= dt;
      if (this.nodT <= 0){ this.nod = 1; this.nodT = 2.5 + Math.random()*4; }
    }
    if (this.nod > 0) this.nod = Math.max(0, this.nod - dt*2.2);

    // 姿勢（呼吸＋発話ジェスチャー＋相槌＋相手を見る首振り）
    const breathe = Math.sin(t*1.4 + this.phase) * 0.015;
    const talkNod = this.speaking ? Math.sin(t*4.5 + this.phase) * 0.05 * Math.min(1,lv*5) : 0;
    const sway    = this.speaking ? Math.sin(t*2.1 + this.phase) * 0.04 : Math.sin(t*0.7+this.phase)*0.012;
    const nodAmt  = Math.sin(this.nod * Math.PI) * 0.18;
    // 首振りは滑らかに追従（会話中は視線がほぼ相手に固定される）
    const yawGoal = this.gazeYaw(partner);
    this.yaw = (this.yaw || 0) + (yawGoal - (this.yaw || 0)) * (1 - Math.exp(-3 * dt));

    // 目：VRMのlookAtで相手の頭を見る（頭の向きより先まで目が動く）
    if (this.vrm?.lookAt && partner){
      const src = partner.vrm
        ? partner.vrm.humanoid.getNormalizedBoneNode('head')
        : partner.mann.head;
      if (this.vrm.lookAt.target !== src) this.vrm.lookAt.target = src;
    }

    if (this.vrm && this.pose){
      // 決めポーズが読み込み済み：ポーズ基準で微振動を上乗せ
      this.applyPosedMotion({ breathe, talkNod, sway, nodAmt, t, yaw: this.yaw });
      this.vrm.update(dt);
    } else if (this.vrm){
      // 決めポーズ未読み込み：暫定のT/Aポーズのまま最低限の首・体幹だけ動かす
      const h = this.vrm.humanoid;
      const head  = h.getNormalizedBoneNode('head');
      const neck  = h.getNormalizedBoneNode('neck');
      const spine = h.getNormalizedBoneNode('spine');
      const chest = h.getNormalizedBoneNode('chest') || spine;
      if (head){ head.rotation.x = talkNod + nodAmt + breathe*0.5; head.rotation.y = this.yaw*0.55; head.rotation.z = sway*0.5; }
      if (neck){ neck.rotation.y = this.yaw*0.3; }
      if (spine){ spine.rotation.y = sway + this.yaw*0.1; spine.rotation.x = breathe; }
      if (chest && chest!==spine){ chest.rotation.x = breathe*0.6; }
      this.vrm.update(dt);
    } else {
      this.mann.head.rotation.x = talkNod + nodAmt;
      this.mann.head.rotation.y = this.yaw*0.8;
      this.mann.group.rotation.z = sway*0.4;
      this.mann.group.position.y = breathe*0.3;
    }
  }
}
const spk = { A: new Speaker('A', 0xd9b38c), B: new Speaker('B', 0x8cb4d9) };
window.flip = id => { spk[id].root.rotation.y += Math.PI; };

/* ══════════ 音声入力 ══════════ */
let audioCtx = null;
const chan = {
  A: { el:null, analyser:null, buf:null, raw:0 },
  B: { el:null, analyser:null, buf:null, raw:0 },
};
let pseudoMode = true;

function hookAudio(id, file){
  if (!audioCtx) return;
  const c = chan[id];
  if (c.el){ c.el.pause(); }
  const el = new Audio(URL.createObjectURL(file));
  el.loop = true;
  const src = audioCtx.createMediaElementSource(el);
  const an  = audioCtx.createAnalyser();
  an.fftSize = 512;
  src.connect(an); an.connect(audioCtx.destination);
  c.el = el; c.analyser = an; c.buf = new Uint8Array(an.fftSize);
  pseudoMode = false; pseudoBtn.classList.remove('on');
}

function readLevels(){
  for (const id of ['A','B']){
    const c = chan[id];
    if (!pseudoMode && c.analyser){
      c.analyser.getByteTimeDomainData(c.buf);
      let sum = 0;
      for (let i=0;i<c.buf.length;i++){ const d=(c.buf[i]-128)/128; sum += d*d; }
      c.raw = Math.sqrt(sum / c.buf.length);
    }
    // 平滑化（アタック速・リリース遅）
    const s = spk[id];
    const target = c.raw;
    const k = target > s.level ? 0.35 : 0.07;
    s.level += (target - s.level) * k;
    s.speaking = s.speaking ? s.level > 0.022 : s.level > 0.04; // ヒステリシス
  }
}

/* ── 疑似トーク生成（交互発話＋間＋たまに食い気味）── */
const pseudo = { cur:'A', t:0, dur:3, gap:false };
function pseudoTick(dt, t){
  if (!pseudoMode) return;
  pseudo.t += dt;
  if (pseudo.t >= pseudo.dur){
    pseudo.t = 0;
    if (!pseudo.gap){
      pseudo.gap = true;
      pseudo.dur = Math.random() < 0.25 ? 0 : 0.25 + Math.random()*0.7; // 25%で食い気味
    } else {
      pseudo.gap = false;
      pseudo.cur = pseudo.cur === 'A' ? 'B' : 'A';
      pseudo.dur = 1.8 + Math.random()*4.5;
    }
  }
  for (const id of ['A','B']){
    const active = !pseudo.gap && pseudo.cur === id;
    const env = active ? 0.06 + 0.05*Math.abs(Math.sin(t*3.1 + (id==='A'?0:2)))
                        * (0.6 + 0.4*Math.sin(t*0.9)) : 0;
    chan[id].raw = env;
  }
}

/* ══════════ カメラ：固定カメラ数台のマルチカム方式 ══════════ */
const tmpA = new THREE.Vector3(), tmpB = new THREE.Vector3();
function headA(){ return spk.A.headWorld(tmpA); }
function headB(){ return spk.B.headWorld(tmpB); }

/* 実際の対談・ポッドキャスト撮影を調べ直した結果：
   本物のマルチカム収録は「1台のカメラが常に動き続ける」のではなく、
   固定された数台のカメラ（引き・A用・B用・カットアウェイ用）を
   編集でパッパッと切り替える方式が基本（ワイド＋各人のアップで構成し、
   話者が変わったらカットするのが定石。参照：ポッドキャスト業界の
   3カメラ構成、および会話シーンの定番「shot/reverse shot」）。
   さらに、アップは真正面ではなく相手側へ振った「肩越し」に近い角度
   （OTS = over-the-shoulder）にするのが会話シーンの標準。
   なので土台をハードカット優先に戻し、常時の揺れは手持ち程度の
   ごく僅かなものだけに抑える。なめらかなパンは「時々混ざる演出」に格下げ。 */
const cam = {
  anchor: new THREE.Vector3(0, 1.35, 0),
  radius: 3.2,
  az: 0.18, el: 0.05,
  driftSeed: Math.random() * 10,
};
const camLook = new THREE.Vector3(0, 1.15, 0);

const ATMO_POS  = new THREE.Vector3(1.1, 1.65, -1.1);
const ATMO_LOOK = new THREE.Vector3(0.2, 2.55, -2.2); // 天井照明・壁パネル方向（カットアウェイ用の固定カメラ）

const target = {
  auto: true,
  name: null, age: 0, maxAge: 6,
  anchor: new THREE.Vector3(0, 1.35, 0), radius: 3.2, azBias: 0.18, elBias: 0.1,
  pendingSpk: null, pendingT: 0, silence: 0, cutCount: 0, atmoCooldown: 6,
};

function fitDistance(halfWidth, minDist){
  const aspect = camera.aspect || 1;
  const vFov = camera.fov * Math.PI / 180;
  const hFov = 2 * Math.atan(Math.tan(vFov / 2) * aspect);
  return Math.max(minDist, halfWidth / Math.tan(hFov / 2));
}

// 球面座標（アンカー中心・回り込み角・仰角・距離）→ ワールド座標
function sphericalPos(anchor, az, el, radius){
  return new THREE.Vector3(
    anchor.x + radius * Math.sin(az) * Math.cos(el),
    anchor.y + radius * Math.sin(el) + 0.14,
    anchor.z + radius * Math.cos(az) * Math.cos(el)
  );
}

/* setTarget：狙い（アンカー・距離・回り込み角・仰角）を更新する。
   ・AアップとBアップの入れ替え、カットアウェイの出入りは必ずハードカット
   ・それ以外も基本ハードカット優先（実写のマルチカムに合わせる）
   ・「引き」だけは五分五分——沈黙でのパンも味として残す
   ・仰角（高さ）はショットごとに別の値を持たせる：見下ろし・目線・見上げを
     はっきり使い分けないと「全部同じ高さ」に見えてしまうため */
function pickElevation(){
  const r = Math.random();
  if (r < 0.22) return -0.16;      // 見上げ（ローアングル）
  if (r < 0.42) return 0.30;       // 見下ろし（ハイアングル）
  return 0.07;                     // ほぼ目線
}
/* 抜け（ルッキングルーム）：アップでは頭を画面中央に置かず、
   視線の先——つまり相手のいる方向——に空間を空ける。
   注視点を「頭」から「頭と相手の間」へ少しずらすと、
   頭が画面の端へ寄り、視線側が抜ける構図になる。 */
function lookRoomOffset(selfHead, otherHead, amount){
  const dir = otherHead.clone().sub(selfHead); dir.y = 0;
  if (dir.lengthSq() < 1e-6) return new THREE.Vector3();
  return dir.normalize().multiplyScalar(amount);
}
function setTarget(name, why){
  if (name === target.name) return;
  const prevName = target.name;
  target.name = name; target.age = 0;
  target.maxAge = name.startsWith('LIS') ? 2.2 + Math.random()*1.5 : 5.5 + Math.random()*4;
  target.cutCount++;
  // スライダー移動：ショットごとに向きと速さを決め、滞在中ゆっくり横に流れる
  target.slide = (Math.random() < 0.5 ? -1 : 1) * (0.012 + Math.random()*0.014);
  target.lookOffset = new THREE.Vector3();

  if (name === 'ATMO'){
    camera.position.copy(ATMO_POS);
    camLook.copy(ATMO_LOOK);
    camera.lookAt(camLook);
  } else {
    const hA = headA().clone(), hB = headB().clone();
    const mid = hA.clone().lerp(hB, 0.5);
    switch(name){
      case 'WIDE':
        target.anchor.copy(mid).setY(1.35);
        target.radius = fitDistance(1.8, 3.6); target.azBias = 0.18;
        target.elBias = Math.random() < 0.3 ? 0.34 : 0.15;
        target.slide *= 0.5; break; // 引きはスライドを控えめに
      case 'TWO':
        target.anchor.copy(mid).setY(mid.y - 0.08);
        target.radius = fitDistance(Math.abs(hA.x - hB.x)/2 + 0.62, 2.4); target.azBias = 0.12;
        target.elBias = 0.09; break;
      case 'CU_A': // Bの肩越しに近い角度でAを狙う（OTS寄り）＋Bの方向へ抜け
        target.anchor.copy(hA); target.radius = 1.6; target.azBias = 0.55;
        target.elBias = pickElevation();
        target.lookOffset = lookRoomOffset(hA, hB, 0.18); break;
      case 'CU_B':
        target.anchor.copy(hB); target.radius = 1.6; target.azBias = -0.55;
        target.elBias = pickElevation();
        target.lookOffset = lookRoomOffset(hB, hA, 0.18); break;
      case 'LIS_A': // 聞き手のリアクションは少し見上げ気味＋抜けはやや控えめ
        target.anchor.copy(hA); target.radius = 2.05; target.azBias = 0.48;
        target.elBias = -0.1;
        target.lookOffset = lookRoomOffset(hA, hB, 0.16); break;
      case 'LIS_B':
        target.anchor.copy(hB); target.radius = 2.05; target.azBias = -0.48;
        target.elBias = -0.1;
        target.lookOffset = lookRoomOffset(hB, hA, 0.16); break;
    }

    const isCUSwap = prevName && prevName.startsWith('CU') && name.startsWith('CU') && prevName !== name;
    const isAtmoEdge = prevName === 'ATMO';
    const baseProb = name === 'WIDE' ? 0.5 : 0.78;
    const hardCut = isCUSwap || isAtmoEdge || Math.random() < baseProb;
    if (hardCut){
      cam.anchor.copy(target.anchor);
      cam.radius = target.radius;
      cam.az = target.azBias + (Math.random() - 0.5) * 0.06; // 毎回寸分同じ画にならないよう微差
      cam.el = target.elBias;
      const pos = sphericalPos(cam.anchor, cam.az, cam.el, cam.radius);
      camera.position.copy(pos);
      camLook.copy(cam.anchor).add(target.lookOffset);
      camera.lookAt(camLook);
    }
    target._lastHardCut = hardCut;
  }

  const label = { WIDE:'引き', TWO:'2ショット', CU_A:'Aアップ(OTS)', CU_B:'Bアップ(OTS)',
                  LIS_A:'Aリアクション', LIS_B:'Bリアクション', ATMO:'カットアウェイ' }[name];
  tallyText.textContent = `${String(target.cutCount).padStart(2,'0')}｜${label}`;
  const line = document.createElement('div');
  const styleTag = name === 'ATMO' ? '✂︎カット' : (target._lastHardCut ? '✂︎カット' : '〜パン');
  line.textContent = `${styleTag}｜${label}  ←${why}`;
  shotLog.prepend(line);
  while (shotLog.children.length > 5) shotLog.lastChild.remove();
}

function switcherTick(dt){
  const a = spk.A.speaking, b = spk.B.speaking;
  const talker = a && b ? 'both' : a ? 'A' : b ? 'B' : null;
  target.age += dt;
  target.silence = talker ? 0 : target.silence + dt;
  target.atmoCooldown -= dt;
  if (!target.auto) return;

  const curCU = target.name === 'CU_A' ? 'A' : target.name === 'CU_B' ? 'B' : null;
  if (talker === 'A' || talker === 'B'){
    if (talker !== curCU){
      if (target.pendingSpk === talker){
        target.pendingT += dt;
        if (target.pendingT > 0.45 && target.age > 1.6){
          setTarget('CU_' + talker, '話者交代'); target.pendingSpk = null;
        }
      } else { target.pendingSpk = talker; target.pendingT = 0; }
    } else target.pendingSpk = null;
  }
  if (talker === 'both' && target.name !== 'TWO' && target.age > 1.4) setTarget('TWO','同時発話');
  // カットアウェイ：引きのまま沈黙が続いたら、たまに部屋の別カメラへ逃がす
  if (target.name === 'WIDE' && target.silence > 3.2 && target.atmoCooldown <= 0){
    setTarget('ATMO','間つなぎ'); target.atmoCooldown = 10 + Math.random()*8;
  } else if (target.name === 'ATMO' && target.age > 2 + Math.random()*1.3){
    setTarget('WIDE','戻し');
  } else if (target.silence > 2.2 && target.name !== 'WIDE' && target.name !== 'ATMO'){
    setTarget('WIDE','沈黙');
  }
  if (target.name !== 'ATMO' && target.age > target.maxAge){
    if (target.name === 'CU_A' && talker === 'A')
      setTarget(Math.random() < 0.6 ? 'LIS_B' : 'TWO', '長回し');
    else if (target.name === 'CU_B' && talker === 'B')
      setTarget(Math.random() < 0.6 ? 'LIS_A' : 'TWO', '長回し');
    else if (target.name.startsWith('LIS'))
      setTarget(talker === 'A' ? 'CU_A' : talker === 'B' ? 'CU_B' : 'TWO', '戻し');
    else if (talker === 'A' || talker === 'B')
      setTarget('CU_' + talker, 'テンポ');
    else target.age = 0;
  }
}

function cameraTick(dt, t){
  if (target.name === 'ATMO'){
    // カットアウェイ中は完全固定カメラ（手持ちのごく僅かな揺れのみ）
    const jx = Math.sin(t*0.6 + cam.driftSeed*3.3) * 0.01;
    const jy = Math.sin(t*0.44 + cam.driftSeed*1.8) * 0.008;
    camera.position.set(ATMO_POS.x + jx, ATMO_POS.y + jy, ATMO_POS.z);
    camLook.copy(ATMO_LOOK);
    camera.lookAt(camLook);
    return;
  }

  // アンカー・距離は狙いへ追いつく（ハードカット時はすでに一致しているので実質動かない）
  const kFollow = 1 - Math.exp(-0.9 * dt);
  cam.anchor.lerp(target.anchor, kFollow);
  cam.radius += (target.radius - cam.radius) * (1 - Math.exp(-0.75 * dt));

  // 常時の動きは「手持ちの微振動」＋ショット中ゆっくり横へ流れるスライダー移動
  const wFast = Math.sin(t*0.55 + cam.driftSeed*3.3) * 0.012;
  const tightness = THREE.MathUtils.clamp(cam.radius / 3.2, 0.25, 1);
  const slide = (target.slide || 0) * Math.min(target.age, target.maxAge); // 滞在時間ぶん横に流れる
  const azTarget = target.azBias + slide + wFast * tightness;
  const elTarget = target.elBias + wFast * 0.4 * tightness;
  cam.az += (azTarget - cam.az) * (1 - Math.exp(-0.7 * dt));
  cam.el += (elTarget - cam.el) * (1 - Math.exp(-0.7 * dt));

  const pos = sphericalPos(cam.anchor, cam.az, cam.el, cam.radius);
  camera.position.lerp(pos, 1 - Math.exp(-1.4 * dt));
  const lookTarget = cam.anchor.clone().add(target.lookOffset || new THREE.Vector3());
  camLook.lerp(lookTarget, 1 - Math.exp(-1.6 * dt));
  camera.lookAt(camLook);
}


/* ══════════ UI 配線 ══════════ */
const tallyText = document.getElementById('tallyText');
const shotLog = document.getElementById('shotLog');
const pseudoBtn = document.getElementById('pseudoBtn');
const playBtn = document.getElementById('playBtn');
const autoBtn = document.getElementById('autoBtn');
let playing = false;

document.getElementById('startBtn').onclick = () => {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  document.getElementById('overlay').remove();
  setTarget('WIDE','開始');
};
pickA.onchange = e => e.target.files[0] && spk.A.loadVRM(e.target.files[0]);
pickB.onchange = e => e.target.files[0] && spk.B.loadVRM(e.target.files[0]);
poseA.onchange = e => {
  const f = e.target.files[0];
  if (!f) return;
  spk.A.loadPose(f).then(() => { if (spk.A.pose) poseABtn.textContent = 'A：ポーズ✓'; });
};
poseB.onchange = e => {
  const f = e.target.files[0];
  if (!f) return;
  spk.B.loadPose(f).then(() => { if (spk.B.pose) poseBBtn.textContent = 'B：ポーズ✓'; });
};
audA.onchange = e => e.target.files[0] && hookAudio('A', e.target.files[0]);
audB.onchange = e => e.target.files[0] && hookAudio('B', e.target.files[0]);
pseudoBtn.onclick = () => {
  pseudoMode = !pseudoMode;
  pseudoBtn.classList.toggle('on', pseudoMode);
};
playBtn.onclick = () => {
  playing = !playing;
  playBtn.textContent = playing ? '⏸ 停止' : '▶ 再生';
  playBtn.classList.toggle('tallyOn', playing);
  for (const id of ['A','B']){
    const el = chan[id].el;
    if (el){ playing ? el.play() : el.pause(); }
  }
  if (audioCtx?.state === 'suspended') audioCtx.resume();
};
autoBtn.onclick = () => {
  target.auto = !target.auto;
  autoBtn.classList.toggle('on', target.auto);
};
document.querySelectorAll('[data-shot]').forEach(b => {
  b.onclick = () => { target.auto = false; autoBtn.classList.remove('on'); setTarget(b.dataset.shot, '手動'); };
});

/* ══════════ メインループ ══════════ */
const clock = new THREE.Clock();
function loop(){
  requestAnimationFrame(loop);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;
  if (playing){ pseudoTick(dt, t); } else { chan.A.raw = 0; chan.B.raw = 0; }
  readLevels();
  spk.A.update(dt, t, spk.B);
  spk.B.update(dt, t, spk.A);
  if (playing) switcherTick(dt);
  cameraTick(dt, t);
  document.querySelector('#meterA i').style.width = Math.min(100, spk.A.level*900) + '%';
  document.querySelector('#meterB i').style.width = Math.min(100, spk.B.level*900) + '%';
  renderer.render(scene, camera);
}
loop();
</script>
